<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle representing a clean global hemisphere -->
  <circle cx="64" cy="64" r="60" fill="#ffffff" />
  
  <g transform="translate(4, 4)">
    <!-- 1. Teal-green brand sky arch -->
    <path
      d="M 10 92 C 12 28, 102 16, 110 56 C 112 58, 108 58, 105 56 C 84 28, 28 36, 18 88 C 17 91, 10 91, 10 92 Z"
      fill="#0f6f89"
    />

    <!-- 2. Airplane swoop in core red on the left lower corner -->
    <path
      d="M 10 92 C 22 93, 46 98, 62 101 C 66 102, 69 98, 68 94 C 65 88, 59 92, 55 93 C 36 94, 20 84, 15 84 C 13 84, 11 88, 10 92 Z"
      fill="#e31e24"
    />

    <!-- 3. Stylized brand Red mountain 'A' -->
    <path
      d="M 44 96 L 62 34 L 74 34 L 88 96 L 76 96 L 74 78 L 54 78 L 52 96 Z"
      fill="#e31e24"
    />
    <!-- A crossbar -->
    <path
      d="M 56 64 L 72 64 L 73 72 L 55 72 Z"
      fill="#ffffff"
    />

    <!-- 4. Global connectivity split sphere/globe node -->
    <g transform="translate(112, 60)">
      <circle cx="0" cy="0" r="10" fill="#0f6f89" />
      <!-- Horizontal / Vertical Split lines for the keyhole/globe effect -->
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#ffffff" strokeWidth="1.2" />
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#ffffff" strokeWidth="1.2" />
      <circle cx="-3.5" cy="0" r="1.5" fill="#ffffff" />
      <circle cx="3.5" cy="0" r="1.5" fill="#ffffff" />
      <circle cx="0" cy="0" r="4.5" fill="none" stroke="#ffffff" strokeWidth="1.2" />
    </g>
  </g>
</svg>
